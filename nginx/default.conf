server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 50m;

    location = /sun/admin {
        return 301 /sun/admin/;
    }

    location = /admin {
        return 301 /admin/;
    }

    location ^~ /sun/admin/ {
        proxy_pass http://backend:8000/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /admin/ {
        proxy_pass http://backend:8000/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /sun/api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /static/admin/simpleui-x/locale/zh-CN.js {
        alias /usr/share/nginx/html/static/admin/simpleui-x/elementui/umd/locale/zh-CN.js;
        access_log off;
        expires 30d;
    }

    location = /static/admin/simpleui-x/locale/ja.js {
        alias /usr/share/nginx/html/static/admin/simpleui-x/elementui/umd/locale/zh-CN.js;
        access_log off;
        expires 30d;
    }

    location = /sun/static/admin/simpleui-x/locale/zh-CN.js {
        alias /usr/share/nginx/html/static/admin/simpleui-x/elementui/umd/locale/zh-CN.js;
        access_log off;
        expires 30d;
    }

    location = /sun/static/admin/simpleui-x/locale/ja.js {
        alias /usr/share/nginx/html/static/admin/simpleui-x/elementui/umd/locale/zh-CN.js;
        access_log off;
        expires 30d;
    }

    location ^~ /sun/static/ {
        alias /usr/share/nginx/html/static/;
        access_log off;
        expires 30d;
    }

    location ^~ /static/ {
        alias /usr/share/nginx/html/static/;
        access_log off;
        expires 30d;
    }

    location ^~ /sun/media/ {
        alias /usr/share/nginx/html/media/;
        access_log off;
        expires 30d;
    }

    location ^~ /media/ {
        alias /usr/share/nginx/html/media/;
        access_log off;
        expires 30d;
    }

    location /sun/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
