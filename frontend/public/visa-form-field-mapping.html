<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Visa Form Field Mapping</title>
  <style>
    :root {
      background: #f5f8fb;
      color: #2f3a45;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid #dce6ef;
      background: #fff;
      box-shadow: 0 2px 8px rgba(47, 58, 69, 0.06);
    }

    h1 {
      margin: 0 12px 0 0;
      font-size: 18px;
    }

    button,
    select,
    textarea,
    input {
      border: 1px solid #c8d6e2;
      border-radius: 6px;
      color: #2f3a45;
      font-size: 14px;
    }

    button {
      min-height: 34px;
      padding: 0 12px;
      background: #aad4f4;
      border-color: #aad4f4;
      cursor: pointer;
      font-weight: 700;
    }

    button.secondary {
      background: #fff;
      border-color: #c8d6e2;
    }

    button.danger {
      background: #fff1f1;
      border-color: #f1bbbb;
      color: #b54747;
    }

    main {
      display: grid;
      grid-template-columns: 270px minmax(520px, 1fr) 360px;
      gap: 14px;
      height: calc(100vh - 60px);
      padding: 14px;
    }

    .card {
      min-height: 0;
      border: 1px solid #dce6ef;
      border-radius: 10px;
      background: #fff;
      box-shadow: 0 8px 22px rgba(47, 58, 69, 0.05);
      overflow: hidden;
    }

    .card h2 {
      margin: 0;
      padding: 12px 14px;
      border-bottom: 1px solid #e5edf4;
      font-size: 15px;
    }

    .card-body {
      height: calc(100% - 45px);
      overflow: auto;
      padding: 10px;
    }

    .group-title {
      margin: 12px 0 8px;
      color: #65798a;
      font-size: 12px;
      font-weight: 800;
    }

    .variable {
      padding: 7px 9px;
      margin-bottom: 6px;
      border: 1px solid #dce6ef;
      border-radius: 6px;
      background: #eef8ff;
      cursor: grab;
      font-size: 13px;
      user-select: none;
    }

    .variable:hover {
      border-color: #88bee9;
      background: #e3f3ff;
    }

    .preview-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      padding: 10px;
      border-bottom: 1px solid #e5edf4;
      background: #fbfdff;
    }

    .page-button.is-active {
      background: #e2c5dd;
      border-color: #e2c5dd;
    }

    .preview-scroll {
      height: calc(100% - 56px);
      overflow: auto;
      padding: 16px;
      background: #dfe8ef;
    }

    .pdf-stage {
      position: relative;
      display: inline-block;
      min-width: 300px;
      background: #fff;
      box-shadow: 0 14px 34px rgba(47, 58, 69, 0.18);
    }

    .pdf-image {
      display: block;
      width: min(100%, 920px);
      height: auto;
    }

    .field-box {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 12px;
      min-height: 10px;
      border: 1.5px solid rgba(60, 156, 105, 0.9);
      background: rgba(60, 156, 105, 0.13);
      color: #14532d;
      font-size: 10px;
      font-weight: 800;
      line-height: 1;
      cursor: crosshair;
      overflow: hidden;
    }

    .field-box.is-checkbox {
      border-color: rgba(206, 71, 71, 0.95);
      background: rgba(206, 71, 71, 0.12);
      color: #8f2424;
    }

    .field-box.is-mapped {
      border-color: rgba(43, 110, 201, 0.95);
      background: rgba(43, 110, 201, 0.16);
      color: #174a9b;
    }

    .field-box.is-over,
    .field-box:hover {
      border-width: 2px;
      background: rgba(255, 235, 150, 0.35);
      z-index: 6;
    }

    .field-box.is-selected {
      outline: 3px solid rgba(226, 197, 221, 0.9);
      z-index: 7;
    }

    .hint {
      margin-bottom: 10px;
      color: #6c7f90;
      font-size: 12px;
      line-height: 1.7;
    }

    .mapping-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .mapping-table th,
    .mapping-table td {
      padding: 7px 6px;
      border-bottom: 1px solid #edf2f7;
      font-size: 12px;
      vertical-align: top;
      word-break: break-all;
    }

    .mapping-table th {
      background: #f8fbfd;
      color: #5d7284;
      text-align: left;
    }

    .mapping-actions {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .mapping-actions button {
      min-height: 26px;
      padding: 0 7px;
      font-size: 12px;
    }

    textarea {
      width: 100%;
      min-height: 260px;
      padding: 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      line-height: 1.5;
      resize: vertical;
    }

    .status {
      min-height: 20px;
      color: #577084;
      font-size: 13px;
    }

    .error {
      color: #b54747;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      height: 22px;
      padding: 0 8px;
      border-radius: 999px;
      background: #edf6fd;
      color: #517087;
      font-size: 12px;
      font-weight: 700;
    }

    @media (max-width: 1180px) {
      main {
        grid-template-columns: 240px minmax(420px, 1fr);
      }

      .right-panel {
        grid-column: 1 / -1;
        min-height: 520px;
      }
    }

    @media (max-width: 820px) {
      main {
        display: block;
        height: auto;
      }

      .card {
        margin-bottom: 12px;
        min-height: 360px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>返签 visa PDF 可视化字段映射</h1>
    <button id="reloadFields">重新加载 PDF</button>
    <button id="reloadMapping" class="secondary">重新加载 mapping</button>
    <button id="saveMapping">保存 mapping</button>
    <span id="status" class="status"></span>
  </header>

  <main id="app">
    <section class="card">
      <h2>系统变量</h2>
      <div class="card-body">
        <div class="hint">把变量拖到中间 PDF 的字段框里。普通字段自动映射为 text，checkbox 自动映射为 checkbox。</div>
        <div id="variables"></div>
      </div>
    </section>

    <section class="card">
      <h2>PDF 预览</h2>
      <div class="preview-toolbar">
        <button class="page-button is-active" data-page="1">第1页</button>
        <button class="page-button secondary" data-page="2">第2页</button>
        <span id="fieldCount" class="pill">字段 0</span>
      </div>
      <div class="preview-scroll" id="previewScroll">
        <div class="pdf-stage" id="pdfStage">
          <img id="pdfImage" class="pdf-image" alt="visa template preview">
          <div id="fieldLayer"></div>
        </div>
      </div>
    </section>

    <section class="card right-panel">
      <h2>当前映射 / JSON</h2>
      <div class="card-body">
        <div class="hint">右侧列表方便删除和定位；复杂 choice 规则可以在下方 JSON 里手动编辑，保存时以 JSON 内容为准。</div>
        <table class="mapping-table">
          <thead>
            <tr>
              <th style="width: 30%">系统变量</th>
              <th style="width: 34%">PDF字段</th>
              <th style="width: 16%">类型</th>
              <th style="width: 20%">操作</th>
            </tr>
          </thead>
          <tbody id="mappingRows"></tbody>
        </table>
        <div class="hint" style="margin-top: 14px;">完整 JSON</div>
        <textarea id="mappingEditor"></textarea>
      </div>
    </section>
  </main>

  <script>
    if (location.protocol === 'file:') {
      document.body.innerHTML = '<main style="padding:24px;font-family:sans-serif"><h1>请不要双击打开本文件。</h1><p>本地请使用：http://localhost:5173/visa-form-field-mapping.html</p><p>线上请使用：/sun/visa-form-field-mapping.html</p></main>'
      throw new Error('file protocol is not supported')
    }

    const PREFIX = location.pathname.startsWith('/sun/') ? '/sun' : ''
    const API_BASE = `${PREFIX}/api/accounting`

    const state = {
      fields: [],
      pages: {},
      variableGroups: [],
      mapping: { template: 'visa_tem.pdf', mappings: {} },
      currentPage: 1,
      selectedField: '',
    }

    const els = {
      status: document.getElementById('status'),
      variables: document.getElementById('variables'),
      fieldCount: document.getElementById('fieldCount'),
      pdfImage: document.getElementById('pdfImage'),
      pdfStage: document.getElementById('pdfStage'),
      fieldLayer: document.getElementById('fieldLayer'),
      previewScroll: document.getElementById('previewScroll'),
      mappingRows: document.getElementById('mappingRows'),
      mappingEditor: document.getElementById('mappingEditor'),
      reloadFields: document.getElementById('reloadFields'),
      reloadMapping: document.getElementById('reloadMapping'),
      saveMapping: document.getElementById('saveMapping'),
      pageButtons: Array.from(document.querySelectorAll('.page-button')),
    }

    function csrfToken() {
      const match = document.cookie.match(/(?:^|; )csrftoken=([^;]+)/)
      return match ? decodeURIComponent(match[1]) : ''
    }

    function setStatus(message, error = false) {
      els.status.textContent = message
      els.status.className = error ? 'status error' : 'status'
    }

    function mappingText() {
      return JSON.stringify(state.mapping, null, 2)
    }

    function syncEditor() {
      els.mappingEditor.value = mappingText()
    }

    function parseEditor() {
      try {
        const value = JSON.parse(els.mappingEditor.value || '{}')
        value.template ||= 'visa_tem.pdf'
        value.mappings ||= {}
        state.mapping = value
        return true
      } catch (error) {
        setStatus(`JSON 错误：${error.message}`, true)
        return false
      }
    }

    function currentPageFields() {
      return state.fields.filter((field) => Number(field.page) === Number(state.currentPage))
    }

    function fieldByName(name) {
      return state.fields.find((field) => field.name === name)
    }

    function valuesFromOptions(options) {
      const values = []
      ;(options || []).forEach((option) => {
        const value = option && Object.prototype.hasOwnProperty.call(option, 'value') ? option.value : option
        if (typeof value === 'string') {
          values.push(value)
        } else if (Array.isArray(value)) {
          value.forEach((item) => values.push(String(item)))
        } else if (value && typeof value === 'object') {
          Object.values(value).flat().forEach((item) => values.push(String(item)))
        }
      })
      return values
    }

    function checkedValueForField(field) {
      const values = valuesFromOptions(field.options)
      return values.find((value) => value && value !== 'Off') || 'Yes'
    }

    function fieldMappingNames(pdfFieldName) {
      const names = []
      const mappings = state.mapping.mappings || {}
      Object.entries(mappings).forEach(([variableName, config]) => {
        if (!config) return
        if (config.pdf_field === pdfFieldName) names.push(variableName)
        const rules = config.rules || {}
        Object.values(rules).forEach((rule) => {
          if (rule && rule.pdf_field === pdfFieldName) names.push(`${variableName}.*`)
        })
      })
      return names
    }

    function renderVariables() {
      els.variables.innerHTML = ''
      state.variableGroups.forEach((group) => {
        const title = document.createElement('div')
        title.className = 'group-title'
        title.textContent = group.label
        els.variables.appendChild(title)
        group.items.forEach((name) => {
          const item = document.createElement('div')
          item.className = 'variable'
          item.draggable = true
          item.textContent = name
          item.dataset.variable = name
          item.addEventListener('dragstart', (event) => {
            event.dataTransfer.setData('text/plain', name)
            event.dataTransfer.effectAllowed = 'copy'
          })
          els.variables.appendChild(item)
        })
      })
    }

    function mapVariableToField(variableName, field) {
      state.mapping.mappings ||= {}
      if (field.type === 'checkbox' || field.type === 'radio') {
        state.mapping.mappings[variableName] = {
          pdf_field: field.name,
          type: 'checkbox',
          checked_value: checkedValueForField(field),
          unchecked_value: 'Off',
        }
      } else {
        state.mapping.mappings[variableName] = {
          pdf_field: field.name,
          type: 'text',
        }
      }
      syncEditor()
      renderAll()
      setStatus(`${variableName} -> ${field.name}`)
    }

    function scaleInfo() {
      const page = state.pages[String(state.currentPage)]
      if (!page || !els.pdfImage.clientWidth || !els.pdfImage.clientHeight) {
        return null
      }
      return {
        scaleX: els.pdfImage.clientWidth / page.width,
        scaleY: els.pdfImage.clientHeight / page.height,
      }
    }

    function renderFieldLayer() {
      els.fieldLayer.innerHTML = ''
      const scale = scaleInfo()
      if (!scale) return
      const fields = currentPageFields()
      els.fieldCount.textContent = `字段 ${fields.length}`

      fields.forEach((field, index) => {
        if (!field.rect) return
        const mappedNames = fieldMappingNames(field.name)
        const box = document.createElement('div')
        box.className = 'field-box'
        if (field.type === 'checkbox' || field.type === 'radio') box.classList.add('is-checkbox')
        if (mappedNames.length) box.classList.add('is-mapped')
        if (state.selectedField === field.name) box.classList.add('is-selected')

        box.textContent = String(index + 1)
        box.style.left = `${field.rect.x0 * scale.scaleX}px`
        box.style.top = `${field.rect.y0 * scale.scaleY}px`
        box.style.width = `${Math.max(field.rect.width * scale.scaleX, 10)}px`
        box.style.height = `${Math.max(field.rect.height * scale.scaleY, 10)}px`
        box.title = [
          `PDF字段名: ${field.name}`,
          `type: ${field.type || field.raw_type || '-'}`,
          `page: ${field.page}`,
          `mapped: ${mappedNames.join(', ') || '-'}`,
        ].join('\n')

        box.addEventListener('dragover', (event) => {
          event.preventDefault()
          box.classList.add('is-over')
        })
        box.addEventListener('dragleave', () => box.classList.remove('is-over'))
        box.addEventListener('drop', (event) => {
          event.preventDefault()
          box.classList.remove('is-over')
          const variableName = event.dataTransfer.getData('text/plain')
          if (!variableName) return
          mapVariableToField(variableName, field)
        })
        box.addEventListener('click', () => {
          state.selectedField = field.name
          renderFieldLayer()
          setStatus(`选中字段：${field.name}`)
        })

        els.fieldLayer.appendChild(box)
      })
    }

    function renderMappingRows() {
      const mappings = state.mapping.mappings || {}
      const entries = Object.entries(mappings)
      els.mappingRows.innerHTML = entries.length ? '' : '<tr><td colspan="4">まだ mapping がありません。</td></tr>'

      entries.forEach(([variableName, config]) => {
        const row = document.createElement('tr')
        const pdfField = config && config.pdf_field ? config.pdf_field : '(choice rules)'
        row.innerHTML = `
          <td>${variableName}</td>
          <td>${pdfField}</td>
          <td>${(config && config.type) || '-'}</td>
          <td>
            <div class="mapping-actions">
              <button class="secondary" data-action="locate">定位</button>
              <button class="danger" data-action="delete">删除</button>
            </div>
          </td>
        `
        row.querySelector('[data-action="delete"]').addEventListener('click', () => {
          delete state.mapping.mappings[variableName]
          syncEditor()
          renderAll()
          setStatus(`已删除：${variableName}`)
        })
        row.querySelector('[data-action="locate"]').addEventListener('click', () => {
          const field = fieldByName(pdfField)
          if (!field) {
            setStatus('choice rules 或字段不存在，无法直接定位', true)
            return
          }
          state.currentPage = Number(field.page)
          state.selectedField = field.name
          updatePreviewImage()
          setStatus(`定位：${field.name}`)
        })
        els.mappingRows.appendChild(row)
      })
    }

    function renderPageButtons() {
      els.pageButtons.forEach((button) => {
        const active = Number(button.dataset.page) === Number(state.currentPage)
        button.classList.toggle('is-active', active)
        button.classList.toggle('secondary', !active)
      })
    }

    function renderAll() {
      renderPageButtons()
      renderFieldLayer()
      renderMappingRows()
    }

    function updatePreviewImage() {
      renderPageButtons()
      els.fieldLayer.innerHTML = ''
      els.pdfImage.src = `${API_BASE}/visa-form-fields/preview/?page=${state.currentPage}&_=${Date.now()}`
    }

    async function loadFields() {
      setStatus('PDF 字段加载中...')
      const response = await fetch(`${API_BASE}/visa-form-fields/`, { credentials: 'same-origin' })
      if (!response.ok) throw new Error(`字段读取失败：${response.status}`)
      const data = await response.json()
      state.fields = data.fields || []
      state.pages = data.pages || {}
      state.variableGroups = data.system_variable_groups || []
      state.mapping = data.mapping || { template: 'visa_tem.pdf', mappings: {} }
      renderVariables()
      syncEditor()
      updatePreviewImage()
      renderMappingRows()
      setStatus(state.fields.length ? `已读取 ${state.fields.length} 个 PDF 字段` : (data.error || '没有读取到 PDF 字段'))
    }

    async function loadMapping() {
      setStatus('mapping 加载中...')
      const response = await fetch(`${API_BASE}/visa-form-field-mapping/`, { credentials: 'same-origin' })
      if (!response.ok) throw new Error(`mapping 读取失败：${response.status}`)
      state.mapping = await response.json()
      syncEditor()
      renderAll()
      setStatus('mapping 已加载')
    }

    async function saveMapping() {
      if (!parseEditor()) return
      setStatus('保存中...')
      const response = await fetch(`${API_BASE}/visa-form-field-mapping/`, {
        method: 'POST',
        credentials: 'same-origin',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': csrfToken(),
        },
        body: JSON.stringify(state.mapping),
      })
      if (!response.ok) {
        const text = await response.text()
        throw new Error(text || `保存失败：${response.status}`)
      }
      setStatus('保存成功')
    }

    els.pdfImage.addEventListener('load', () => renderFieldLayer())
    window.addEventListener('resize', () => renderFieldLayer())

    els.pageButtons.forEach((button) => {
      button.addEventListener('click', () => {
        state.currentPage = Number(button.dataset.page)
        state.selectedField = ''
        updatePreviewImage()
      })
    })

    els.reloadFields.addEventListener('click', () => loadFields().catch((error) => setStatus(error.message, true)))
    els.reloadMapping.addEventListener('click', () => loadMapping().catch((error) => setStatus(error.message, true)))
    els.saveMapping.addEventListener('click', () => saveMapping().catch((error) => setStatus(error.message, true)))
    els.mappingEditor.addEventListener('blur', () => {
      if (parseEditor()) renderAll()
    })

    loadFields().catch((error) => setStatus(error.message, true))
  </script>
</body>
</html>
